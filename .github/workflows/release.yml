name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    if: github.repository == '42433422/devfleet'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-2022'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      CARGO_NET_RETRY: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && (contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Setup Python for native Node builds
        if: startsWith(matrix.platform, 'windows')
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build MCP package
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          npm run mcp:build
          Copy-Item README.md dist-mcp\README.md
          Compress-Archive -Path dist-mcp\* -DestinationPath devfleet-mcp.zip -Force

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '排比 Para v__VERSION__'
          releaseBody: |
            ## 排比 Para v__VERSION__

            真实多设备协同开发控制平台

            ### 下载安装
            - **macOS**: 下载 .dmg 文件并拖到 Applications 文件夹
            - **Windows**: 下载 `.msi` 或 `-setup.exe` 安装包
            - **Linux**: 下载 .AppImage 或 .deb 包运行
            - **Trae / Codex / Cursor MCP**: 下载 `devfleet-mcp.zip`
            - **自托管服务端**: 下载与系统匹配的 `devfleet-server-<platform>.zip`（已内置 Node.js 22）或使用仓库中的 Docker Compose

            ### 新功能
            - 主设备可向在线工作设备下发受控远程命令/脚本，回传日志、退出码和输出
            - MCP 新增 `devfleet_run_remote_command`，Codex 可直接让 Win32/Mac 工作设备执行本机 CLI
            - Agent 远程命令执行使用软/硬超时，避免 CLI 卡死长期占用设备
            - 一次性绑定码和独立设备令牌
            - 目标设备显示绑定者，检测并默认启动 Trae
            - Codex CLI 在各设备真实修改、提交、推送分支
            - Trae / Codex / Cursor MCP 调度和主设备真实 Git 合并
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package server bundle
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $args = "${{ matrix.args }}"
          if ($platform -eq "windows-2022") {
            $suffix = "windows-x64"
          } elseif ($platform -eq "ubuntu-22.04") {
            $suffix = "linux-x64"
          } elseif ($args -like "*aarch64*") {
            $suffix = "macos-arm64"
          } else {
            $suffix = "macos-x64"
          }

          $packageDir = Join-Path "dist-server" "package-$suffix"
          Remove-Item -Recurse -Force $packageDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "server-package/*" $packageDir -Recurse -Force
          Copy-Item "dist-server/devfleet-server.cjs" $packageDir -Force
          Copy-Item "dist-server/node_modules" $packageDir -Recurse -Force
          Copy-Item "dist-server/runtime" $packageDir -Recurse -Force

          $zipName = "devfleet-server-$suffix.zip"
          Remove-Item -Force $zipName -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $packageDir "*") -DestinationPath $zipName -Force
          "SERVER_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload MCP package
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset "${{ github.ref_name }}" devfleet-server.zip -y || true
          gh release upload "${{ github.ref_name }}" devfleet-mcp.zip --clobber

      - name: Upload server package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$SERVER_ZIP" --clobber
